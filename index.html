<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #161b22; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 1px solid #30363d; }
        .btn-step { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: bold; text-decoration: none; display: inline-block; box-sizing: border-box; color: white; transition: 0.3s; }

        .youtube { background: #ff0000; }
        .youtube:hover { background: #cc0000; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 14px; text-align: center; }
        .access-btn { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        #script-output { display: none; margin-top: 20px; background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; color: #00ff00; word-break: break-all; text-align: left; border: 1px solid #30363d; }
    </style>
</head>
