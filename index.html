<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primo Secure Access</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #161b22; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 1px solid #30363d; }
        button.tiktok { background: #ee1d52; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button.access { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .script-area { display: none; margin-top: 20px; background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; color: #00ff00; word-break: break-all; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-bottom: 5px;">Primo Script</h2>
        <p style="font-size: 13px; color: #8b949e; margin-bottom: 20px;">Follow to get the password</p>
        
        <button class="tiktok" onclick="window.open('https://www.tiktok.com/@primo_legitaccount')">1. FOLLOW TIKTOK FIRST</button>
        
        <input type="password" id="passInput" placeholder="Enter Password Here...">
        <button class="access" onclick="check()">2. ACCESS SCRIPT</button>

        <div id="result" class="script-area"></div>
    </div>

    <script>
        function check() {
            const pw = document.getElementById('passInput').value;
            const res = document.getElementById('result');
            if(pw === "PRIMOONTOP") {
                // Iyong Script
                res.innerText = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/dezqpal/Primo/main/GokGok.lua"))()';
                res.style.display = "block";
                alert("Success! Copy the script below.");
            } else {
                alert("Wrong Password! Hint: Check my TikTok Bio.");
            }
        }
    </script>
</body>
</html>
