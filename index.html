<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | GokGokV2</title>
    <style>
        body { 
            background-color: #0b0e14; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .card { 
            background: #161b22; 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #30363d; 
            text-align: center; 
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.15); 
            width: 350px; 
        }
        h2 { margin-top: 0; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 20px 0; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: #00d4ff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 16px; 
            outline: none;
        }
        input:focus { border-color: #00c6ff; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(45deg, #00c6ff, #0072ff); 
            border: none; 
            color: white; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        #content { display: none; }
        .script-box { 
            background: #0d1117; 
            color: #39ff14; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #30363d; 
            font-family: 'Consolas', monospace; 
            font-size: 12px; 
            word-break: break-all; 
            text-align: left; 
            margin-top: 15px; 
            line-height: 1.4;
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div id="login-box" class="card">
        <h2 style="color: #00c6ff;">Secure Access</h2>
        <p style="font-size: 14px; color: #8b949e;">Enter password to get the script</p>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="check()">Access</button>
    </div>

    <div id="content" class="card" style="width: 90%; max-width: 500px;">
        <h2 style="color: #39ff14;">🔓 Access Granted</h2>
        <p style="font-size: 14px;">Copy the loadstring below:</p>
        <div class="script-box">
            loadstring(game:HttpGet("https://raw.githubusercontent.com/dezqpal/Primo/refs/heads/main/GokGokV2.lua"))()
        </div>
        <button style="margin-top: 20px; background: #30363d;" onclick="location.reload()">Lock Again</button>
    </div>

    <script>
        // Security logic
        function check() {
            var input = document.getElementById("pass").value;
            
            // Password set to PRIMOONTOP
            if (input === "PRIMOONTOP") { 
                document.getElementById("login-box").style.display = "none";
                document.getElementById("content").style.display = "block";
            } else {
                alert("Maling Password! Subukan muli.");
            }
        }

        // Disable F12 and Inspect Element shortcuts
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    </script>
</body>
</html>
