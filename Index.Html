<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primo | Legitimacy Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Primo Logo Background */
            background: url('https://r.jina.ai/i/9e00667a216441ca913982e0573c054e') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dark overlay para lumitaw ang card */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(18, 24, 31, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
            border: 1px solid #1e2732;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 26px;
        }

        p {
            color: #8a99a8;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-vouch {
            display: block;
            width: 100%;
            padding: 15px;
            background: #1877f2; /* Facebook Blue */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-vouch:hover {
            background: #166fe5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Salamat sa Tiwala!</h2>
    <p>Para makita ang aking legitimacy o mag-iwan ng vouch, i-click lang ang button sa ibaba.</p>
    
    <a href="https://www.facebook.com/share/v/1EJ2FKrfCP/" class="btn-vouch">
        Vouch Here
    </a>
</div>

</body>
</html>
